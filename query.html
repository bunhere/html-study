<!doctype html>
<head>
<script src="http://ajax.googleapis.com/ajax/libs/jquery/1.10.1/jquery.min.js"></script>
</head>
<body>
<input id="inp" value="#id1 .class4">
<input id="btn"type="button">
<script>
$(document).ready(function() {
    var i = 0;
    var depth = 0;
    var prevN = $('body');
    while (i < 100) {
        var n = $("<div></div>");
        n.attr('id', 'id' + i).text('test').addClass('class' + i);
        if (depth < 10) {
            prevN.append(n);
            
            depth++;
        } else {
            depth = 0;
            $('body').append(n);
        }
        prevN = n;
        i++;
    }
    var inp = $('#inp');
    $('#btn').click(function() {
        window.alert(inp.val());
        window.alert($(inp.val()).html());
        });
});
</script>
</body>
